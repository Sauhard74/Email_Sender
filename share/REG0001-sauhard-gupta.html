<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sauhard Gupta — ASCENT 2026</title>

  <meta property="og:title" content="Sauhard Gupta is attending ASCENT 2026!" />
  <meta property="og:description" content="Escape the Ordinary — Scaler School of Technology's biggest tech fest. 17th May 2026, Bengaluru." />
  <meta property="og:image" content="https://sauhard74.github.io/Email_Sender/share/REG0001-sauhard-gupta.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://sauhard74.github.io/Email_Sender/share/REG0001-sauhard-gupta.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ASCENT 2026" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sauhard Gupta is attending ASCENT 2026!" />
  <meta name="twitter:description" content="Escape the Ordinary — Scaler School of Technology's biggest tech fest." />
  <meta name="twitter:image" content="https://sauhard74.github.io/Email_Sender/share/REG0001-sauhard-gupta.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 700px; }
    h1 { font-size: 48px; letter-spacing: 6px; margin-bottom: 8px; }
    .tagline { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 24px; }
    .poster { width: 100%; max-width: 600px; border-radius: 12px; margin-bottom: 24px; }
    .details { color: #ccc; font-size: 16px; line-height: 1.8; margin-bottom: 24px; }
    .share-btn {
      display: none;
      background: #0077B5;
      color: #fff;
      border: none;
      padding: 16px 40px;
      border-radius: 8px;
      font-size: 17px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      margin-top: 8px;
    }
    .share-btn:active { background: #005f8f; }
    .status { color: #888; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ASCENT</h1>
    <p class="tagline">ESCAPE THE ORDINARY</p>
    <img id="poster" src="REG0001-sauhard-gupta.png" alt="Sauhard Gupta's ASCENT 2026 Ticket" class="poster" />
    <p class="details">
      <strong>Sauhard Gupta</strong> is attending ASCENT 2026!<br>
      Scaler School of Technology's biggest tech fest<br>
      17th May 2026 &bull; Bengaluru
    </p>
    <button id="shareBtn" class="share-btn">Share on LinkedIn</button>
    <p class="status" id="status"></p>
  </div>

  <script>
    const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    const statusEl = document.getElementById('status');
    const shareBtn = document.getElementById('shareBtn');

    const shareText = '🚀 Just registered for ASCENT 2026 — Escape the Ordinary!\n\nExcited to be part of Scaler School of Technology\'s biggest fest.\n\n📅 17th May 2026 | Bengaluru\n\nDon\'t miss out — register now on Unstop!\n\n#ASCENT2026 #ScalerSchoolOfTechnology #EscapeTheOrdinary #TechFest';

    if (isMobile) {
      // Mobile: show share button, use Web Share API on tap
      shareBtn.style.display = 'inline-block';

      shareBtn.addEventListener('click', async () => {
        try {
          const res = await fetch('REG0001-sauhard-gupta.png');
          const blob = await res.blob();
          const file = new File([blob], 'ASCENT-2026-Ticket.png', { type: 'image/png' });

          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              text: shareText,
              files: [file],
            });
          } else {
            // Fallback: open LinkedIn share-offsite
            window.location.href = 'https://www.linkedin.com/sharing/share-offsite/?url=https%3A%2F%2Fsauhard74.github.io%2FEmail_Sender%2Fshare%2FREG0001-sauhard-gupta.html';
          }
        } catch (e) {
          if (e.name !== 'AbortError') {
            // Share failed (not user cancel) — fallback
            window.location.href = 'https://www.linkedin.com/sharing/share-offsite/?url=https%3A%2F%2Fsauhard74.github.io%2FEmail_Sender%2Fshare%2FREG0001-sauhard-gupta.html';
          }
        }
      });
    } else {
      // Desktop: auto-redirect to LinkedIn with pre-filled caption
      statusEl.textContent = 'Redirecting to LinkedIn...';
      window.location.href = 'https://www.linkedin.com/feed/?shareActive=true&text=%F0%9F%9A%80%20Just%20registered%20for%20ASCENT%202026%20%E2%80%94%20Escape%20the%20Ordinary%21%0A%0AExcited%20to%20be%20part%20of%20Scaler%20School%20of%20Technology%27s%20biggest%20fest.%0A%0A%F0%9F%93%85%2017th%20May%202026%20%7C%20Bengaluru%0A%0ADon%27t%20miss%20out%20%E2%80%94%20register%20now%20on%20Unstop%21%0A%0A%23ASCENT2026%20%23ScalerSchoolOfTechnology%20%23EscapeTheOrdinary%20%23TechFest%0A%0Ahttps%3A%2F%2Fsauhard74.github.io%2FEmail_Sender%2Fshare%2FREG0001-sauhard-gupta.html';
    }
  </script>
</body>
</html>
