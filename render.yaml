services:
  - type: web
    name: ascent-dashboard
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_SECRET
        generateValue: true
      - key: DASHBOARD_PASSWORD
        value: ascent2026
      - key: GITHUB_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
