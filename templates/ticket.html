<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  #ticket {
    display: flex;
    width: 900px;
    height: 320px;
    border-radius: 12px;
    overflow: hidden;
    font-family: 'Barlow Condensed', sans-serif;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }

  /* ── LEFT PANEL (black) ── */
  .left-panel {
    width: 240px;
    min-width: 240px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    border-right: 2px dashed #333;
    position: relative;
  }

  .scaler-logo img {
    width: 160px;
    filter: brightness(0) invert(1);
  }

  .qr-code {
    width: 130px;
    height: 130px;
    background: white;
    padding: 6px;
    border-radius: 4px;
  }

  .qr-code img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .website {
    color: #888;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
  }

  /* ── RIGHT PANEL (actual background image) ── */
  .right-panel {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 28px 28px 20px 36px;
    overflow: hidden;
  }

  .right-panel .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('../assets/background.jpeg');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* dark overlay for readability */
  .right-panel .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(5, 10, 45, 0.72) 0%,
      rgba(20, 5, 55, 0.60) 40%,
      rgba(0, 0, 20, 0.78) 70%,
      rgba(35, 0, 50, 0.70) 100%
    );
    z-index: 1;
  }

  /* ── ASCENT logo top right ── */
  .ascent-logo {
    position: absolute;
    top: 16px;
    right: 24px;
    text-align: right;
    z-index: 2;
  }

  .ascent-logo img {
    height: 90px;
    /* PNG has light-colored logo — screen blend makes white bg invisible on dark */
    mix-blend-mode: screen;
    filter: brightness(1.1);
  }

  /* ── Main text ── */
  .main-content {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 220px;
  }

  .welcome-label {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 4px;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 4px;
  }

  .participant-name {
    color: white;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,255,255,0.2);
    margin-bottom: 18px;
  }

  .access-label {
    color: #aaa;
    font-size: 11px;
    letter-spacing: 3px;
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 4px;
  }

  .event-name {
    color: white;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
  }

  /* ── Bottom row ── */
  .bottom-row {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .date-time {
    color: white;
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    letter-spacing: 2px;
  }

  /* ── Barcode ── */
  .barcode-section {
    text-align: right;
  }

  .barcode {
    display: flex;
    gap: 2px;
    margin-bottom: 4px;
    justify-content: flex-end;
  }

  .barcode .bar {
    background: white;
    height: 40px;
  }

  .barcode-number {
    color: #ccc;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="ticket">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="scaler-logo">
      <img src="../assets/scaler-logo.png" alt="Scaler School of Technology"/>
    </div>

    <div class="qr-code">
      <img src="{{ qr_code_path }}" alt="QR Code"/>
    </div>

    <div class="website">WWW.ASCENT.SCALER.COM</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <!-- ASCENT logo top right -->
    <div class="ascent-logo">
      <img src="../assets/logo.png" alt="ASCENT — Escape the Ordinary"/>
    </div>

    <!-- Main content -->
    <div class="main-content">
      <div class="welcome-label">WELCOME ABOARD</div>
      <div class="participant-name">{{ participant_name }}</div>
      <div class="access-label">YOUR ACCESS KEY HAS BEEN ACTIVATED FOR</div>
      <div class="event-name">{{ event_name }}</div>
    </div>

    <!-- Bottom: date + barcode -->
    <div class="bottom-row">
      <div class="date-time">{{ date_time }}</div>

      <div class="barcode-section">
        <div class="barcode">
          {% set widths = [2,4,2,6,2,3,5,2,4,2,6,3,2,4,2,5,3,2,4,2,6,2,3,5,2,4,3,2,5,2,4,2,6,3,2,4,2,5,2,3] %}
          {% for w in widths %}
            <div class="bar" style="width: {{ w }}px;"></div>
          {% endfor %}
        </div>
        <div class="barcode-number">{{ registration_id }}</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
